name: 🚀 Deploy to Oracle Cloud

on:
  push:
    branches: [main, master]

jobs:
  deploy:
    name: Deploy to Oracle VM
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: 📦 Install dependencies
        run: npm ci
        
      - name: 🔨 Build application
        run: npm run build
        
      - name: 📂 Create deployment package
        run: |
          mkdir -p deploy
          cp -r dist/ deploy/
          cp -r public/ deploy/
          cp package*.json deploy/
          tar -czf deploy.tar.gz deploy/
          
      - name: 🚀 Deploy to Oracle VM
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: 136.248.109.21
          username: ubuntu
          key: ${{ secrets.ORACLE_SSH_KEY }}
          script_stop: true
          script: |
            echo "🚀 Iniciando deploy..."
            cd ~/enviaPromo
            
            echo "📦 Recebendo arquivos..."
            # O SCP sera feito pelo appleboy/scp-action em versao futura
            # Por enquanto, fazemos o deploy via script
            
      - name: 📤 Upload deploy package to VM
        run: |
          # Criar arquivo de chave temporario
          echo "${{ secrets.ORACLE_SSH_KEY }}" > /tmp/oracle_key.pem
          chmod 600 /tmp/oracle_key.pem
          
          # Enviar arquivo via SCP
          scp -i /tmp/oracle_key.pem -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null deploy.tar.gz ubuntu@136.248.109.21:~/enviaPromo/
          
          # Limpar chave
          rm -f /tmp/oracle_key.pem
          
      - name: 🔄 Restart application on VM
        run: |
          # Criar arquivo de chave temporario
          echo "${{ secrets.ORACLE_SSH_KEY }}" > /tmp/oracle_key.pem
          chmod 600 /tmp/oracle_key.pem
          
          # Executar comandos via SSH
          ssh -i /tmp/oracle_key.pem -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null ubuntu@136.248.109.21 << 'EOF'
            cd ~/enviaPromo
            echo "📦 Extraindo arquivos..."
            tar -xzf deploy.tar.gz
            cp -r deploy/dist/* dist/ 2>/dev/null || cp -r deploy/dist dist-new && rm -rf dist && mv dist-new dist
            cp -r deploy/public/* public/ 2>/dev/null || true
            cp deploy/package*.json ./ 2>/dev/null || true
            rm -rf deploy deploy.tar.gz
            
            echo "📥 Instalando dependencias..."
            npm ci --production
            
            echo "🔄 Reiniciando PM2..."
            pm2 restart promo-monitor || pm2 start dist/index.js --name promo-monitor
            pm2 save
            
            echo "✅ Deploy concluido com sucesso!"
            echo "🌐 URL: http://136.248.109.21:3001"
          EOF
          
          # Limpar chave
          rm -f /tmp/oracle_key.pem
          
      - name: ✅ Notify success
        run: |
          echo "🎉 Deploy realizado com sucesso!"
          echo "🌐 Aplicacao disponivel em: http://136.248.109.21:3001"
