name: 🚀 Deploy to Oracle Cloud

on:
  push:
    branches: [main, master]

jobs:
  deploy:
    name: Deploy to Oracle VM
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: latest

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🔨 Build application
        run: pnpm run build

      - name: 📂 Create deployment package
        run: |
          mkdir -p deploy
          cp -r dist/ deploy/
          cp -r public/ deploy/
          cp package*.json deploy/
          tar -czf deploy.tar.gz deploy/

      - name: 📤 Upload deploy package
        run: |
          echo "📤 Enviando pacote de deploy..."
          curl -X POST \
            -F "file=@deploy.tar.gz" \
            -H "X-Deploy-Token: deploy-token-123456" \
            http://136.248.109.21:3001/api/deploy/upload \
            --connect-timeout 30 \
            --max-time 120

      - name: 🔄 Trigger deploy
        run: |
          echo "🔄 Acionando deploy na VM..."
          curl -X POST \
            -H "X-Deploy-Token: deploy-token-123456" \
            http://136.248.109.21:3001/api/deploy/trigger \
            --connect-timeout 30 \
            --max-time 120

      - name: ✅ Notify success
        run: |
          echo "🎉 Deploy realizado com sucesso!"
          echo "🌐 Aplicacao: http://136.248.109.21:3001"
