name: 🚀 Deploy to Oracle Cloud

on:
  push:
    branches: [main, master]

jobs:
  deploy:
    name: Deploy to Oracle VM
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: 🟢 Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: latest

      - name: 🟢 Obter diretório cache pnpm
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: 🟢 Restaurar cache pnpm
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🔨 Build application
        run: pnpm run build

      - name: 📂 Create deployment package
        run: |
          mkdir -p deploy
          cp -r dist/ deploy/
          cp -r public/ deploy/
          cp package*.json deploy/
          tar -czf deploy.tar.gz deploy/

      - name: 📤 Upload deploy package
        run: |
          echo "📤 Enviando pacote de deploy..."
          UPLOAD_RESP=$(curl -s -w "\n%{http_code}" -X POST \
            -F "file=@deploy.tar.gz" \
            -H "X-Deploy-Token: deploy-token-change-in-production" \
            http://136.248.109.21:3001/api/deploy/upload \
            --connect-timeout 30 \
            --max-time 120)
          HTTP_CODE=$(echo "$UPLOAD_RESP" | tail -1)
          BODY=$(echo "$UPLOAD_RESP" | head -n -1)
          echo "Resposta: $BODY (HTTP $HTTP_CODE)"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ Upload falhou!"
            exit 1
          fi

      - name: 🔄 Trigger deploy
        run: |
          echo "🔄 Acionando deploy na VM..."
          TRIGGER_RESP=$(curl -s -w "\n%{http_code}" -X POST \
            -H "X-Deploy-Token: deploy-token-change-in-production" \
            http://136.248.109.21:3001/api/deploy/trigger \
            --connect-timeout 30 \
            --max-time 120)
          HTTP_CODE=$(echo "$TRIGGER_RESP" | tail -1)
          BODY=$(echo "$TRIGGER_RESP" | head -n -1)
          echo "Resposta: $BODY (HTTP $HTTP_CODE)"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ Trigger falhou!"
            exit 1
          fi

      - name: ⏳ Aguardar deploy
        run: sleep 15

      - name: 🔍 Verificar versão no servidor
        run: |
          echo "🔍 Verificando se o servidor está online..."
          curl -s --connect-timeout 10 --max-time 15 http://136.248.109.21:3001/ > /dev/null
          echo "✅ Servidor respondeu!"
