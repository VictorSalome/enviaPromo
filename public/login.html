<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Promo Monitor</title>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.2/dist/full.min.css" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen flex items-center justify-center bg-base-200">
  <div class="card w-96 bg-base-100 shadow-xl">
    <div class="card-body">
      <h2 class="card-title text-2xl text-center mb-4">🎯 Promo Monitor</h2>
      <p class="text-center text-base-content/60 mb-6">Faça login para acessar</p>
      
      <form id="loginForm" class="space-y-4">
        <div class="form-control">
          <label class="label">
            <span class="label-text">Usuário</span>
          </label>
          <input type="text" id="username" name="username" class="input input-bordered" placeholder="admin" required>
        </div>
        
        <div class="form-control">
          <label class="label">
            <span class="label-text">Senha</span>
          </label>
          <input type="password" id="password" name="password" class="input input-bordered" placeholder="••••••" required>
        </div>
        
        <button type="submit" class="btn btn-primary w-full">
          Entrar
        </button>
      </form>
      
      <div id="errorMessage" class="alert alert-error mt-4 hidden">
        <span>Usuário ou senha inválidos</span>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      
      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        
        const data = await response.json();
        
        if (data.success) {
          window.location.href = '/';
        } else {
          document.getElementById('errorMessage').classList.remove('hidden');
        }
      } catch (err) {
        document.getElementById('errorMessage').classList.remove('hidden');
        document.getElementById('errorMessage').querySelector('span').textContent = 'Erro de conexão';
      }
    });
  </script>
</body>
</html>
